// {{stem}}.cfg — Overload (gametype from Team Arena)
// Shared by every q3 server of this gametype on the host; per-instance
// .env files invoke it via +exec {{stem}}.cfg.
// Trinity-required cvars live in trinity.cfg, exec'd from autoexec.cfg.
// Requires missionpack/pak0.pk3 (Team Arena retail).

set sv_hostname        "{{hostname}}"
set g_gametype         6
set capturelimit       8
set timelimit          20
set g_overtimelimit    5
set sv_maxclients      12
set bot_minplayers     4

// Team rules
set g_friendlyFire     0
set g_autoJoin         3
set g_teamForceBalance 1

// Map cycle is in rotation.{{stem}} (alongside this file).
set g_rotation         "rotation.{{stem}}"

map mpteam2
