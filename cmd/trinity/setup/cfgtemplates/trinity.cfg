// trinity.cfg — Trinity-required and recommended cvars.
// Generated by `trinity init`. Edit if you know what you're doing.
//
// This file is exec'd from autoexec.cfg (and missionpack/autoexec.cfg
// if you run any gametypes from Team Arena), so it applies to every
// q3 server instance on this host.

// --- REQUIRED ----------------------------------------------------------
// g_logSync 1: flush every log line to disk so the collector tails fresh
// content. Without this, events arrive at the hub minutes late on a
// busy server.
set g_logSync          1

// g_trinityHandshake 1: tells the hub this server is enforcing the
// Trinity client handshake. The hub ignores match_start from servers
// without this — no stats land for unenforcing servers.
set g_trinityHandshake 1

// rconpassword: must match q3_servers[<this server>].rcon_password in
// /etc/trinity/config.yml. Without it, !claim / !help / welcome
// messages can't be delivered (they're sent via rcon).
set rconpassword       "{{rcon_password}}"

// g_overtimelimit 2: bound sudden-death overtime to two minutes.
// Engine default is 0 (unbounded), which produces enormous demo files
// when a tied match drags on. Per-server <key>.cfg files set a
// finite timelimit for the same reason; this caps the post-timelimit
// tiebreak so demos can't grow without bound. Required for that
// reason — leave it alone.
set g_overtimelimit    2

// --- DEMO RECORDING (recommended) --------------------------------------
// Auto-record demos so the hub can replay matches.
set sv_tvAuto                  1
set sv_tvpath                  "demos"

// Discard recordings that never had a real human player. Default 0/0
// would fill your disk with bot-only matches.
set sv_tvAutoMinPlayers        1
set sv_tvAutoMinPlayersSecs    60

// --- FAST DOWNLOAD (recommended if you ran bootstrap-nginx.sh) ---------
// Lets clients fetch missing pk3s and .tvd recordings from the
// nginx :27970 vhost. Without these, players who don't already have a
// map can't fetch it from your server.
{{fastdl_block}}
