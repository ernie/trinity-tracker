// trinity.cfg — Trinity-required and recommended cvars.
// Generated by `trinity init`. Exec'd from autoexec.cfg, applies to
// every q3 server instance on this host.

// --- REQUIRED ----------------------------------------------------------
set g_logSync          1   // sync log writes so the collector tails them live
set g_trinityHandshake 1   // hub ignores match_start without this
set rconpassword       "{{rcon_password}}"

// --- ENGINE / NETWORK --------------------------------------------------
set sv_fps             40
set com_hunkmegs       256
set sv_maxrate         50000
set sv_pure            0
set logfile            0   // journald captures stdout
set g_unlagged         1

// --- MASTER SERVER -----------------------------------------------------
set dedicated          2   // 2 = announce to master server
set sv_master1         "mp.quakevr.com"

// --- DOWNLOADS ---------------------------------------------------------
set sv_allowDownload   1
set sv_dlRate          500

// --- DEMO RECORDING ----------------------------------------------------
set sv_tvAuto                  1
set sv_tvpath                  "demos"
set sv_tvAutoMinPlayers        1   // skip bot-only matches
set sv_tvAutoMinPlayersSecs    60

// --- MATCH FLOW (per-mode cfgs may override) ---------------------------
set g_doWarmup         1
set g_warmup           20
set g_inactivity       120
set g_weaponrespawn    5
set g_forcerespawn     0
set g_allowvote        1
set g_motd             "{{motd_host}}"

// --- BOTS --------------------------------------------------------------
set bot_enable                 1
set bot_nochat                 1
set g_spskill                  3   // bot difficulty 1 (easy) – 5 (nightmare)
set g_skipBotFiles             1   // ignore .bot files in loaded pk3s

// --- FAST DOWNLOAD -----------------------------------------------------
// nginx dl.<host> vhost serves missing pk3s and .tvd recordings.
{{fastdl_block}}
