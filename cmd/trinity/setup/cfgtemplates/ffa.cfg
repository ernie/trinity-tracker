// {{key}}.cfg — Free-For-All
// Loaded per-instance by the systemd template unit (+exec {{key}}.cfg).
// Trinity-required cvars live in trinity.cfg, exec'd from autoexec.cfg.

set sv_hostname     "{{hostname}}"
set g_gametype      0
set fraglimit       30
set timelimit       15
set sv_maxclients   16

// Starting map. Add a map cycle by uncommenting and tuning:
//   set d1 "map q3dm17 ; set nextmap vstr d2"
//   set d2 "map q3dm6  ; set nextmap vstr d3"
//   set d3 "map q3dm7  ; set nextmap vstr d1"
//   vstr d1
map q3dm17
