// {{key}}.cfg — Tournament (1v1)
// Loaded per-instance by the systemd template unit (+exec {{key}}.cfg).
// Trinity-required cvars live in trinity.cfg, exec'd from autoexec.cfg.

set sv_hostname     "{{hostname}}"
set g_gametype      1
set fraglimit       0
set timelimit       10
set sv_maxclients   8
// Tournament gametype runs 1v1 with everyone else queued as spectators.

// Starting map. q3tourney2 ("The Proving Grounds") is a classic 1v1.
map q3tourney2
