// {{key}}.cfg — Harvester (gametype from Team Arena)
// Loaded per-instance by the systemd template unit (+exec {{key}}.cfg).
// Trinity-required cvars live in trinity.cfg, exec'd from autoexec.cfg.
//
// Requires Team Arena installed: missionpack/pak0.pk3 must be in
// place, and the systemd unit picks fs_game=missionpack from
// /etc/trinity/{{key}}.env.
//
// Like CTF, Harvester uses g_capturelimit (each skull deposited at the
// enemy obelisk = 1 score).

set sv_hostname     "{{hostname}}"
set g_gametype      7
set capturelimit    8
set timelimit       20
set sv_maxclients   16
set g_friendlyFire  0

// Starting map (one of the Team Arena maps).
map mpteam6
