// --- Trinity Features ---
seta cg_damagePlums 1              // floating damage numbers
seta cg_hitSounds 1                // damage-scaled hit sounds (1=low pitch=high dmg, 2=high pitch=high dmg)
seta cg_damageEffect 1             // directional red vignette instead of blood splatter
seta cg_bloodParticles 1           // particle blood with wall/floor splats
seta cg_drawTimer 1                // improved match timer
seta cg_followMode 1               // orbit camera for spectating (0=first-person, 1=orbit)
set cg_followKiller 1              // when spectating, automatically follow the killer

seta cg_crosshairSize 12           // smaller crosshair

// --- Force enemy/team models ---
// Requires "pm" (colored) or "fb" (fullbright) skin for colors to work
// Colors: 3 digits for head/torso/legs (1=R 2=G 3=Y 4=B 5=C 6=M 7=W)
// seta cg_enemyModel "keel/pm"
// seta cg_enemyColors "333"
// seta cg_teamModel "doom/pm"
// seta cg_teamColors "222"
// seta cg_deadBodyDarken 1        // grey out dead bodies (requires pm/fb model)

// --- Memory ---
seta com_hunkmegs 512              // main memory allocation
seta com_soundMegs 32              // sound memory allocation

// --- Renderer ---
seta cl_renderer "vulkan"          // use Vulkan renderer if not statically compiled
seta r_textureMode "GL_LINEAR_MIPMAP_LINEAR" // trilinear filtering (supported in Vulkan)
seta r_textureBits 32              // 32-bit textures
seta r_colorBits 32                // 32-bit color depth
seta r_depthBits 24                // 24-bit depth buffer
seta r_stencilBits 8               // 8-bit stencil buffer
seta r_detailTextures 1            // enable detail textures
seta r_picmip 0                    // maximum texture quality (no texture reduction)
seta r_ext_compressed_textures 0   // disable texture compression
seta r_ext_multisample 4           // 4x MSAA (requires r_fbo 1)
seta r_ext_supersample 1           // supersample AA for even higher quality (requires r_fbo 1)
seta r_ext_texture_filter_anisotropic 1 // enable anisotropic filtering
seta r_ext_max_anisotropy 16       // maximum anisotropic filtering level
seta r_gamma 1.2                   // slight gamma boost for better visibility
seta r_intensity 1.0               // default lighting/color intensity
seta r_mapOverBrightBits 2         // default
seta r_overBrightBits 1            // default (0 washes out lighting)
seta r_ignorehwgamma 0             // default
seta r_dynamicLight 1              // enable dynamic lighting
seta r_dlightMode 2                // high-quality per-pixel dynamic lighting
seta r_vertexLight 0               // disable vertex lighting (use full lighting)
seta r_subdivisions 0.5            // maximum quality curved surfaces
seta r_lodBias -2                  // maximum model detail
seta r_lodCurveError 8192          // maximum geometry detail
seta r_roundImagesDown 0           // round textures up (preserves detail)
seta r_fastSky 0                   // full skybox rendering
seta r_drawSun 1                   // enable sun rendering
seta r_ignoreGLErrors 1            // ignore minor GL errors
seta r_swapInterval 2              // mailbox mode (avoids tearing)
seta r_fbo 1                       // offscreen rendering (unlocks MSAA, HDR, bloom, etc.)
seta r_hdr 1                       // high dynamic range (eliminates color banding)
seta r_bloom 1                     // bloom post-processing (requires r_fbo 1)
seta r_vbo 1                       // cache static surfaces in VBO for better performance
seta r_flares 0                    // disable flares (blow out the image at high res)
seta r_neatsky 1                   // always r_picmip 0 the sky

// --- Gameplay ---
seta cg_shadows 1                  // blob shadows
seta cg_marks 1                    // weapon marks on walls
seta cg_simpleItems 0              // 3D item models instead of 2D sprites
seta cg_brassTime 2500             // show shell casings longer
seta cg_gibs 1                     // enable gibs
seta cg_fov 90                     // standard FOV
seta cg_fovAdjust 1                // handle widescreen automatically
seta cg_draw2D 1                   // enable 2D HUD elements
seta cg_oldPlasma 0                // new plasma effect
seta cg_oldRocket 0                // new rocket effect
seta cg_oldRail 0                  // new rail effect
seta cg_trueLightning 0.5          // new lightning effect

// --- Network ---
seta com_maxfps 250                // cap FPS at 250
seta snaps 40                      // snapshot rate
seta rate 50000                    // network bandwidth rate
seta cl_maxpackets 125             // maximum packets per second

// --- Convenience ---
seta com_skipIdLogo 1              // skip the intro logo
seta con_scale 1.5                 // slightly larger console text
seta cg_autoswitch 0               // never switch weapons on pickup
seta cg_zoomfov 22.5               // 4x zoom
seta cg_drawFPS 0                  // hide FPS counter

// --- Key Bindings ---
bind F10 "r_screenshotjpegquality 100;screenshotJPEG"
bind q +button2                    // use item
bind mouse2 +zoom                  // zoom
bind CTRL "+movedown"              // crouch
bind t "messagemode"               // message all
bind y "messagemode2"              // message team
bind g "messagemode3"              // message target
bind h "messagemode4"              // message attacker
bind f "+button3"                  // gesture/taunt

// --- Demo Recording Toggle (F4) ---
set rec-demo vstr record
set record "g_synchronousclients 1;record;g_synchronousclients 0;set rec-demo vstr stop;echo ^1[^7Started Recording Demo^1];"
set stop "stoprecord;set rec-demo vstr record;echo ^1[^7Stopped Recording Demo^1];"
bind F4 "vstr rec-demo"
