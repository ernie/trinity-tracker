// --- Trinity Features ---
seta cg_damagePlums 1              // floating damage numbers
seta cg_hitSounds 1                // damage-scaled hit sounds (1=low pitch=high dmg, 2=high pitch=high dmg)
seta cg_damageEffect 1             // directional red vignette instead of blood splatter
seta cg_bloodParticles 1           // particle blood with wall/floor splats
seta cg_drawTimer 1                // improved match timer
seta cg_smoothFollow 1             // smooth camera transitions when spectating
seta cg_drawCrosshair 8
seta cg_crosshairSize 8
seta cg_drawCrosshairNames 1
seta cg_drawAttacker 0

// --- Force enemy/team models ---
// Requires "pm" (colored) or "fb" (fullbright) skin for colors to work
// Colors: 3 digits for head/torso/legs (1=R 2=G 3=Y 4=B 5=C 6=M 7=W)
// seta cg_enemyModel "keel/pm"
// seta cg_enemyColors "333"
// seta cg_teamModel "doom/pm"
// seta cg_teamColors "222"
// seta cg_deadBodyDarken 1        // grey out dead bodies (requires pm/fb model)

// --- Memory ---
seta com_hunkMegs 512              // main memory allocation
seta com_soundMegs 128             // sound memory allocation
seta s_mixahead 0.05               // lower sound latency

// --- Renderer ---
seta r_gamma 1.2                   // slight gamma boost for better visibility
seta r_intensity 1.0               // default lighting/color intensity
seta r_mapOverBrightBits 2         // default
seta r_overBrightBits 1            // default (0 washes out lighting)
seta r_fbo 1                       // enable framebuffer objects
seta r_bloom 1                     // enable bloom
seta r_dlightMode 2                // high-quality per-pixel dynamic lighting
seta r_arb_seamless_cube_map 1     // better looking skyboxes
seta r_ext_max_anisotropy 16       // sharper textures at oblique angles (default: 8)
seta r_neatsky 1                   // full-resolution sky textures
seta r_shadowClip 1                // Clip stencil shadows against BSP: 0=off, 1=on
seta r_shadowClipPenetration 4     // Default. Sets how far a shadow vertex can cast past a surface
seta r_shadowClipExtension 20      // Default. Extends clipped vertices up to this far to allow connecting to a neighbor. Prevents gaps in long shadows.
seta r_shadowDistance 256          // Default distance

// --- Gameplay ---
seta cg_shadows 2                  // Stencil shadows
seta cg_playerShadow 0             // Disable player shadow (stencil won't work, blob overlaps stencil in mirrors)
seta cg_marks 1                    // weapon marks on walls
seta cg_simpleItems 0              // 3D item models instead of 2D sprites
seta cg_brassTime 2500             // show shell casings longer
seta cg_gibs 1                     // enable gibs
seta cg_drawFPS 0                  // hide FPS counter
seta cg_drawSpeed 0
seta cg_oldPlasma 0                // new plasma effect
seta cg_oldRocket 0                // new rocket effect
seta cg_oldRail 0                  // new rail effect
seta cg_trueLightning 0.5          // new lightning effect

// --- Network ---
seta com_maxfps 120                // cap FPS at 120 (default: 72)
seta cl_maxpackets 125             // maximum packets per second (default: 72)
seta snaps 40                      // snapshot rate
seta rate 50000                    // network bandwidth rate (default: 25000)
seta cl_guidServerUniq 0           // consistent GUID across servers
seta cl_tvDownload 1               // download TV demos from server at end of match

// --- Convenience ---
seta com_skipIdLogo 1              // skip the intro logo
seta skip_ioq3_credits 1           // skip the ioquake3 credits screen
seta cg_autoswitch 0               // never switch weapons on pickup

// --- Demo Recording Toggle (F4) ---
set rec-demo vstr record
set record "g_synchronousclients 1;record;g_synchronousclients 0;set rec-demo vstr stop;echo ^1[^7Started Recording Demo^1];"
set stop "stoprecord;set rec-demo vstr record;echo ^1[^7Stopped Recording Demo^1];"
bind F4 "vstr rec-demo"

// --- VR Settings ---
seta vr_hudDepth 3
seta vr_hudScale 1.5
seta vr_thumbstickDeadzone 0.1
seta vr_thumbstickFullDeflection 0.85
seta vr_triggerSensitivity 0.9

// --- VR Controls (Meta Touch Plus — adjust for your controller) ---
seta vr_button_map_PRIMARYTRIGGER "+attack"
seta vr_button_map_PRIMARYTRIGGER_ALT ""
seta vr_button_map_SECONDARYTRIGGER "+moveup"         // jump
seta vr_button_map_SECONDARYTRIGGER_ALT ""
seta vr_button_map_PRIMARYGRIP "+weapon_select"
seta vr_button_map_PRIMARYGRIP_ALT ""
seta vr_button_map_SECONDARYGRIP "+weapon_stabilise"   // two-hand aiming
seta vr_button_map_SECONDARYGRIP_ALT ""
seta vr_button_map_A "+moveup"                         // jump
seta vr_button_map_A_ALT ""
seta vr_button_map_B "+movedown"                       // crouch
seta vr_button_map_B_ALT ""
seta vr_button_map_X "+button2"                        // use item
seta vr_button_map_X_ALT ""
seta vr_button_map_Y "+button3"                        // gesture/taunt
seta vr_button_map_Y_ALT "togglemenu"
seta vr_button_map_PRIMARYTHUMBSTICK ""
seta vr_button_map_PRIMARYTHUMBSTICK_ALT ""
seta vr_button_map_SECONDARYTHUMBSTICK "+scores"
seta vr_button_map_SECONDARYTHUMBSTICK_ALT ""
seta vr_button_map_RTHUMBFORWARD ""
seta vr_button_map_RTHUMBFORWARD_ALT ""
seta vr_button_map_RTHUMBBACK ""
seta vr_button_map_RTHUMBBACK_ALT ""
seta vr_button_map_RTHUMBLEFT "turnleft"
seta vr_button_map_RTHUMBLEFT_ALT ""
seta vr_button_map_RTHUMBRIGHT "turnright"
seta vr_button_map_RTHUMBRIGHT_ALT ""
seta vr_button_map_PRIMARYTHUMBREST "+alt"
seta vr_button_map_SECONDARYTHUMBREST "+alt"
seta vr_button_map_PRIMARYTRACKPAD "+scores"           // for Index controllers
seta vr_button_map_PRIMARYTRACKPAD_ALT ""
seta vr_button_map_SECONDARYTRACKPAD "togglemenu"      // for Index controllers
seta vr_button_map_SECONDARYTRACKPAD_ALT ""
