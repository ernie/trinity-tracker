name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: go test ./...

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile --cwd web

      - name: Build frontend
        run: bun run --cwd web build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and package each arch
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euxo pipefail
          mkdir -p dist
          # Cross-compile + package one arch. Layout inside the tarball:
          #   trinity-linux-<arch>/
          #     trinity         (the binary)
          #     web/            (built frontend assets — only needed for hub installs)
          # Asset name has no version (the tag/release page already carries it),
          # so install.sh can use the stable releases/latest/download URL.
          build_arch() {
              local arch="$1" goos="$2" goarch="$3" goarm="${4:-}"
              local stage="trinity-linux-${arch}"
              local tarball="dist/trinity-linux-${arch}.tar.gz"
              rm -rf "$stage"
              mkdir -p "$stage"
              GOOS="$goos" GOARCH="$goarch" GOARM="$goarm" \
                  go build -ldflags "-X main.version=${VERSION}" \
                  -o "$stage/trinity" ./cmd/trinity
              cp -r web/dist "$stage/web"
              tar -czf "$tarball" "$stage"
              rm -rf "$stage"
          }
          build_arch amd64 linux amd64
          build_arch arm64 linux arm64
          build_arch arm   linux arm 7

      - name: Generate checksums
        run: |
          set -euxo pipefail
          ( cd dist && sha256sum trinity-linux-*.tar.gz > sha256sums.txt )
          cat dist/sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/trinity-linux-amd64.tar.gz
            dist/trinity-linux-arm64.tar.gz
            dist/trinity-linux-arm.tar.gz
            dist/sha256sums.txt
          generate_release_notes: true
